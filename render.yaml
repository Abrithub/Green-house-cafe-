services:
  - type: web
    name: green-house-cafe
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix client && npm run build --prefix client && npm install --prefix server
    startCommand: NODE_ENV=production npm run start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
