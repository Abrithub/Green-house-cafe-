services:
  - type: web
    name: green-house-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        value: https://green-house-cafe.vercel.app
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
