services:
  - type: web
    name: green-house-api
    runtime: node
    plan: free
    buildCommand: npm install --prefix server
    startCommand: NODE_ENV=production SERVE_CLIENT=false npm run start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
